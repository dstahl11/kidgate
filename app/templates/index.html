<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>KidGate</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🛡️ KidGate</h1>
      <div>
        <span class="who">{{ user.name }}</span>
        {% if user.role == 'admin' %} · <a href="/audit">Log</a>{% endif %}
        · <form method="post" action="/logout" style="display:inline"><button type="submit">Sign out</button></form>
      </div>
    </header>

    <div id="card" class="status-card unknown">
      <div><span class="dot"></span><span id="state" class="state-label">Loading…</span></div>
      <div id="source" class="source"></div>
      <div id="countdown" class="countdown"></div>
    </div>

    <button id="primary" class="primary block" data-action="">…</button>
    <div id="banner" class="banner err"></div>

    <div class="section">
      <h2>Temporary block</h2>
      <div class="grid">
        <button class="chip" data-temp="15">15 min</button>
        <button class="chip" data-temp="30">30 min</button>
        <button class="chip" data-temp="60">1 hour</button>
        <button class="chip" data-bedtime="1">Until bedtime</button>
      </div>
    </div>

    <div class="section" id="override-section">
      <h2>Bedtime override</h2>
      <div class="grid">
        <button class="chip" data-override="15">+15 min</button>
        <button class="chip" data-override="30">+30 min</button>
        <button class="chip" data-override="60">+1 hour</button>
        <button class="chip" data-cancel-override="1">End override</button>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
