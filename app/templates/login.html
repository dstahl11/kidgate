<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1120">
  <title>KidGate — Sign in</title>
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="wrap">
    <div class="login-wrap">
      <img class="login-logo" src="/static/icon.svg" alt="" aria-hidden="true">
      <h1>KidGate</h1>
      <p class="tagline">Control the kids' internet from your phone — one tap.</p>

      <div class="login-box">
        {% if error %}<div class="banner err show" role="alert">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
          <div class="field">
            <input name="username" placeholder="Username" autocomplete="username" autofocus autocapitalize="none" autocorrect="off" spellcheck="false">
          </div>
          <div class="field">
            <input id="pw" name="password" type="password" placeholder="Password" autocomplete="current-password">
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">👁</button>
          </div>
          <button class="primary allow" type="submit">Sign in</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var btn = document.getElementById('toggle-pw'), pw = document.getElementById('pw');
      btn.addEventListener('click', function () {
        var show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        btn.style.color = show ? 'var(--text)' : 'var(--muted)';
      });
    })();
  </script>
</body>
</html>
